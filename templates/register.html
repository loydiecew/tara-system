<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARA - Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-page: #f5f7fc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --accent: #10b981;
            --accent-dark: #059669;
            --input-bg: #f8fafc;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-page: #0f172a;
                --bg-card: #1e293b;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #334155;
                --input-bg: #0f172a;
            }
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 600px;
        }

        .register-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 40px 36px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
        }
        .logo-icon span { font-size: 26px; font-weight: 700; color: white; }
        .logo h1 { font-size: 26px; font-weight: 700; color: var(--text-primary); }
        .logo h1 span { color: var(--accent); }
        .logo p { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group { margin-bottom: 16px; }
        .form-group.full-width { grid-column: span 2; }

        .form-group label {
            display: block;
            font-size: 12px; font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .input-group { position: relative; }
        .input-group i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary); font-size: 14px;
            pointer-events: none;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .input-group select { appearance: none; cursor: pointer; }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 12px 16px; border-radius: 14px;
            margin-bottom: 24px; font-size: 13px;
            border-left: 3px solid #ef4444;
        }

        .btn-register {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white; border: none; border-radius: 14px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; margin-top: 8px;
        }
        .btn-register:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px -5px rgba(16, 185, 129, 0.4);
        }

        .login-link {
            text-align: center; margin-top: 24px;
            padding-top: 20px; border-top: 1px solid var(--border);
            font-size: 13px; color: var(--text-secondary);
        }
        .login-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .info-hint { margin-top: 6px; font-size: 11px; color: var(--text-secondary); }

        @media (max-width: 560px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            .register-card { padding: 28px 20px; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="logo">
                <div class="logo-icon"><span>T</span></div>
                <h1>TARA<span>.</span></h1>
                <p>Start your accounting journey</p>
            </div>

            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" name="full_name" placeholder="Juan Dela Cruz" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Username</label>
                        <div class="input-group">
                            <i class="fas fa-at"></i>
                            <input type="text" name="username" placeholder="juan123" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Business Name</label>
                        <div class="input-group">
                            <i class="fas fa-building"></i>
                            <input type="text" name="business_name" placeholder="Maria's Coffee Shop" required>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label>Business Password</label>
                        <div class="input-group">
                            <i class="fas fa-key"></i>
                            <input type="password" name="business_password" placeholder="For all team members" required>
                        </div>
                        <div class="info-hint">All employees will use this to access the business</div>
                    </div>

                    <!-- Industry Category + Subcategory stacked naturally -->
                    <div class="form-group">
                        <label>Industry Category</label>
                        <div class="input-group">
                            <i class="fas fa-store"></i>
                            <select id="industryCategory" onchange="updateSubcategories()" required>
                                <option value="">Select category...</option>
                                <option value="food_beverage">Food & Beverage</option>
                                <option value="retail">Retail</option>
                                <option value="health_wellness">Health & Wellness</option>
                                <option value="professional_services">Professional Services</option>
                                <option value="service_based">Service-Based</option>
                                <option value="construction_realestate">Construction & Real Estate</option>
                                <option value="hospitality_travel">Hospitality & Travel</option>
                                <option value="logistics">Logistics</option>
                                <option value="technology">Technology</option>
                                <option value="creative_media">Creative & Media</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div id="subcategoryGroup" style="display: none; margin-top: 10px;">
                            <label style="font-size: 11px;">Specific Industry</label>
                            <div class="input-group">
                                <i class="fas fa-tag"></i>
                                <select name="industry" id="industrySubcategory" required>
                                    <option value="">Select specific industry...</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Business Size / Plan</label>
                        <div class="input-group">
                            <i class="fas fa-chart-line"></i>
                            <select name="business_size" required>
                                <option value="solo">Solo - Basic (₱500/mo)</option>
                                <option value="small">Small - Pro (₱1,500/mo)</option>
                                <option value="medium">Medium - Enterprise (₱5,000/mo)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-register">
                    <i class="fas fa-rocket"></i> Create Your Business
                </button>
            </form>

            <div class="login-link">
                Already have a business account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        const subcategories = {
            'food_beverage': [
                {value: 'restaurant', label: 'Restaurant'},
                {value: 'cafe', label: 'Cafe / Coffee Shop'},
                {value: 'bakery', label: 'Bakery'},
                {value: 'catering', label: 'Catering'},
                {value: 'food_cart', label: 'Food Cart / Street Food'}
            ],
            'retail': [
                {value: 'retail', label: 'Retail Store'},
                {value: 'sari_sari', label: 'Sari-Sari Store'},
                {value: 'pharmacy', label: 'Pharmacy'},
                {value: 'hardware', label: 'Hardware Store'},
                {value: 'bookstore', label: 'Bookstore / School Supplies'}
            ],
            'health_wellness': [
                {value: 'gym', label: 'Gym / Fitness Center'},
                {value: 'salon', label: 'Salon / Barbershop'},
                {value: 'spa', label: 'Spa / Massage'},
                {value: 'dental', label: 'Dental Clinic'},
                {value: 'medical', label: 'Medical Clinic'}
            ],
            'professional_services': [
                {value: 'law_firm', label: 'Law Firm'},
                {value: 'accounting_firm', label: 'Accounting Firm'},
                {value: 'consultancy', label: 'Consultancy'},
                {value: 'architecture', label: 'Architecture Firm'},
                {value: 'freelancer', label: 'Freelancer'}
            ],
            'service_based': [
                {value: 'laundry', label: 'Laundry Shop'},
                {value: 'repair_shop', label: 'Repair Shop'},
                {value: 'tutoring', label: 'Tutoring Center'},
                {value: 'cleaning', label: 'Cleaning Services'},
                {value: 'printing', label: 'Printing Shop'}
            ],
            'construction_realestate': [
                {value: 'construction', label: 'Construction'},
                {value: 'real_estate', label: 'Real Estate'},
                {value: 'property_mgmt', label: 'Property Management'}
            ],
            'hospitality_travel': [
                {value: 'hotel', label: 'Hotel / Inn'},
                {value: 'hostel', label: 'Hostel / Dormitory'},
                {value: 'event_venue', label: 'Event Venue'},
                {value: 'travel_agency', label: 'Travel Agency'}
            ],
            'logistics': [
                {value: 'delivery', label: 'Delivery Service'},
                {value: 'trucking', label: 'Trucking / Hauling'},
                {value: 'warehouse', label: 'Warehouse'}
            ],
            'technology': [
                {value: 'computer_shop', label: 'Computer Shop'},
                {value: 'it_services', label: 'IT Services'},
                {value: 'electronics_repair', label: 'Electronics Repair'}
            ],
            'creative_media': [
                {value: 'photography', label: 'Photography Studio'},
                {value: 'graphic_design', label: 'Graphic Design'},
                {value: 'video_production', label: 'Video Production'}
            ],
            'other': [
                {value: 'other', label: 'Other / Not Listed'}
            ]
        };

        function updateSubcategories() {
            const category = document.getElementById('industryCategory').value;
            const subGroup = document.getElementById('subcategoryGroup');
            const subSelect = document.getElementById('industrySubcategory');
            
            subSelect.innerHTML = '<option value="">Select specific industry...</option>';
            
            if (category && subcategories[category]) {
                subcategories[category].forEach(sub => {
                    subSelect.innerHTML += `<option value="${sub.value}">${sub.label}</option>`;
                });
                subGroup.style.display = 'block';
            } else {
                subGroup.style.display = 'none';
            }
        }
    </script>
</body>
</html>
