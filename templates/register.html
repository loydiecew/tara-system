<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARA - Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 560px;
        }

        .register-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .logo-icon span {
            font-size: 28px;
            font-weight: 700;
            color: white;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
        }

        .logo h1 span {
            color: #10b981;
        }

        .logo p {
            font-size: 13px;
            color: #64748b;
            margin-top: 6px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .input-group select {
            appearance: none;
            cursor: pointer;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #10b981;
            background: white;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .input-group input::placeholder {
            color: #94a3b8;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 24px;
            font-size: 13px;
            border-left: 3px solid #dc2626;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-register:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            font-size: 13px;
            color: #64748b;
        }

        .login-link a {
            color: #10b981;
            text-decoration: none;
            font-weight: 600;
        }

        .info-hint {
            margin-top: 8px;
            font-size: 11px;
            color: #94a3b8;
        }

        @media (max-width: 560px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .register-card {
                padding: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="logo">
                <div class="logo-icon"><span>T</span></div>
                <h1>TARA<span>.</span></h1>
                <p>Start your accounting journey</p>
            </div>

            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" name="full_name" placeholder="Juan Dela Cruz" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Username</label>
                        <div class="input-group">
                            <i class="fas fa-at"></i>
                            <input type="text" name="username" placeholder="juan123" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Business Name</label>
                        <div class="input-group">
                            <i class="fas fa-building"></i>
                            <input type="text" name="business_name" placeholder="Maria's Coffee Shop" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Business Password</label>
                        <div class="input-group">
                            <i class="fas fa-key"></i>
                            <input type="password" name="business_password" placeholder="For all team members" required>
                        </div>
                        <div class="info-hint">All employees will use this to access the business</div>
                    </div>

                    <div class="form-group">
                        <label>Industry</label>
                        <div class="input-group">
                            <i class="fas fa-store"></i>
                            <select name="industry" required>
                                <option value="retail">🛍️ Retail Store</option>
                                <option value="restaurant">🍽️ Restaurant / Cafe</option>
                                <option value="freelancer">💻 Freelancer</option>
                                <option value="construction">🏗️ Construction</option>
                                <option value="other">📋 Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label>Business Size / Plan</label>
                        <div class="input-group">
                            <i class="fas fa-chart-line"></i>
                            <select name="business_size" required>
                                <option value="solo">👤 Solo (Just me) - Basic Plan (₱500/month)</option>
                                <option value="small">👥 Small (2-5 employees) - Pro Plan (₱1,500/month)</option>
                                <option value="medium">🏢 Medium (5-20 employees) - Enterprise Plan (₱5,000/month)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-register">
                    <i class="fas fa-rocket"></i> Create Your Business
                </button>
            </form>

            <div class="login-link">
                Already have a business account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
