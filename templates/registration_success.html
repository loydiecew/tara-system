<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful - TARA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-container {
            max-width: 500px;
            width: 100%;
        }

        .success-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .success-icon i {
            font-size: 40px;
            color: white;
        }

        h1 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .business-name {
            font-size: 18px;
            color: #10b981;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .business-id-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            margin: 24px 0;
        }

        .business-id-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .business-id-value {
            font-size: 24px;
            font-weight: 700;
            font-family: monospace;
            color: #10b981;
            letter-spacing: 1px;
            word-break: break-all;
        }

        .info-text {
            font-size: 13px;
            color: #64748b;
            margin: 16px 0;
            line-height: 1.5;
        }

        .warning-box {
            background: #fef3c7;
            border-left: 3px solid #f59e0b;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: left;
            font-size: 13px;
            color: #92400e;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 16px;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
        }

        .save-btn {
            background: #3b82f6;
            margin-left: 12px;
        }

        .save-btn:hover {
            background: #2563eb;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-card">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            
            <h1>Welcome to TARA!</h1>
            <div class="business-name">{{ business_name }}</div>
            
            <p class="info-text">Your business has been successfully created.</p>
            
            <div class="business-id-box">
                <div class="business-id-label">Your Business ID</div>
                <div class="business-id-value" id="businessId">{{ business_id }}</div>
                <button class="btn save-btn" onclick="copyBusinessId()" style="margin-top: 12px; padding: 8px 16px; font-size: 12px;">
                    <i class="fas fa-copy"></i> Copy Business ID
                </button>
            </div>
            
            <div class="warning-box">
                <i class="fas fa-exclamation-triangle"></i>
                <strong>Important!</strong><br>
                Save this Business ID. You'll need it to:
                <ul style="margin-top: 8px; margin-left: 20px;">
                    <li>Log in to your account</li>
                    <li>Share with your employees</li>
                    <li>Access your business data</li>
                </ul>
            </div>
            
            <a href="/dashboard" class="btn">
                <i class="fas fa-arrow-right"></i> Go to Dashboard
            </a>
        </div>
    </div>

    <script>
        function copyBusinessId() {
            const businessId = document.getElementById('businessId').innerText;
            navigator.clipboard.writeText(businessId).then(() => {
                alert('Business ID copied to clipboard!');
            });
        }
    </script>
</body>
</html>
