<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARA - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Light mode (default) */
        :root {
            --bg-page: #f5f7fc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --accent: #10b981;
            --accent-dark: #059669;
            --input-bg: #f8fafc;
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-page: #0f172a;
                --bg-card: #1e293b;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #334155;
                --input-bg: #0f172a;
            }
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
        }

        .logo-icon span {
            font-size: 26px;
            font-weight: 700;
            color: white;
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo h1 span {
            color: var(--accent);
        }

        .logo p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .input-group input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 24px;
            font-size: 13px;
            border-left: 3px solid #ef4444;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px -5px rgba(16, 185, 129, 0.4);
        }

        .register-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-secondary);
        }

        .register-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .demo-hint {
            margin-top: 20px;
            padding: 12px;
            background: var(--input-bg);
            border-radius: 14px;
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon"><span>T</span></div>
                <h1>TARA<span>.</span></h1>
                <p>Total Automated & Reliable Accounting</p>
            </div>

            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" name="username" placeholder="your_username" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Business ID</label>
                    <div class="input-group">
                        <i class="fas fa-building"></i>
                        <input type="text" name="business_id" placeholder="TARA-X7K9-2M4P" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Business Password</label>
                    <div class="input-group">
                        <i class="fas fa-key"></i>
                        <input type="password" name="business_password" placeholder="Business password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-arrow-right-to-bracket"></i> Sign In
                </button>
            </form>

            <div class="register-link">
                Don't have an account? <a href="/register">Create your business</a>
            </div>

            <div class="demo-hint">
                <i class="fas fa-shield-alt"></i> Business credentials provided by your owner
            </div>
        </div>
    </div>
</body>
</html>
