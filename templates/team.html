<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARA - Team Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); }
        :root {
            --bg-primary: #f5f7fc;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-light: #e2e8f0;
            --accent: #10b981;
        }
        body.dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-light: #334155;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .card { background: var(--bg-secondary); border-radius: 20px; padding: 24px; border: 1px solid var(--border-light); margin-bottom: 24px; }
        .btn { padding: 10px 20px; border-radius: 12px; font-weight: 600; border: none; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
        .btn-danger { background: #fee2e2; color: #ef4444; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-light); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-admin { background: #dcfce7; color: #166534; }
        .badge-manager { background: #dbeafe; color: #1e40af; }
        .badge-cashier { background: #fef3c7; color: #92400e; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid var(--border-light); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2 style="margin-bottom: 20px;"><i class="fas fa-users"></i> Team Members</h2>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
                    <tbody>
                        {% for u in users %}
                        <tr>
                            <td>{{ u.full_name or u.username }}</td>
                            <td>{{ u.username }}</td>
                            <td><span class="badge badge-{{ u.role }}">{{ u.role|capitalize }}</span></td>
                            <td>{{ u.created_at.strftime('%Y-%m-%d') if u.created_at else '-' }}</td>
                            <td>{% if u.id != session.user_id %}<a href="/admin/delete_user/{{ u.id }}" class="btn btn-danger" style="padding: 5px 10px;" onclick="return confirm('Delete user?')">Delete</a>{% else %}-{% endif %}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card">
            <h3><i class="fas fa-user-plus"></i> Add New User</h3>
            <form method="POST" action="/admin/add_user">
                <div class="form-grid">
                    <div class="form-group"><label>Full Name</label><input type="text" name="full_name" required></div>
                    <div class="form-group"><label>Username</label><input type="text" name="username" required></div>
                    <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
                    <div class="form-group"><label>Role</label>
                        <select name="role">
                            <option value="cashier">Cashier</option>
                            <option value="manager">Manager</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="form-group"><button type="submit" class="btn btn-primary">Add User</button></div>
                </div>
            </form>
        </div>
    </div>
    <script>const savedTheme = localStorage.getItem('theme') || 'light'; if (savedTheme === 'dark') document.body.classList.add('dark');</script>
</body>
</html>
