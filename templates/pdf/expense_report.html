<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Expense Report</title>
<style>
body{font-family:'Inter',sans-serif;font-size:11px;color:#1a1a1a;padding:30px}
h1{font-size:18px;margin-bottom:4px}h2{font-size:13px;color:#555;margin-bottom:16px}
table{width:100%;border-collapse:collapse;margin-bottom:16px}
th{text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#888;padding:8px 6px;border-bottom:2px solid #333}
td{padding:6px;border-bottom:1px solid #e0e0e0;font-size:10px}
.right{text-align:right}.total-row{font-weight:700;border-top:2px solid #333}
</style></head><body>
<h1>{{ business_name }}</h1><h2>Expense Report — {{ month }}</h2>
<table><thead><tr><th>Category</th><th>Transactions</th><th class="right">Total</th></tr></thead><tbody>
{% for e in expense_categories %}<tr><td>{{ e.category }}</td><td>{{ e.count }}</td><td class="right">₱{{ "%.2f"|format(e.total) }}</td></tr>{% endfor %}
<tr class="total-row"><td colspan="2">Total Expenses</td><td class="right">₱{{ "%.2f"|format(total_expenses) }}</td></tr>
</tbody></table>
<div class="footer" style="margin-top:24px;font-size:9px;color:#999;text-align:center">Generated by TARA on {{ today.strftime('%B %d, %Y') }}</div>
</body></html>
