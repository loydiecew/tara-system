<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales Report</title>
    <style>
        @page { margin: 20px; size: A4 portrait; }
        body { font-family: Arial, sans-serif; color: #1e293b; }
        .header { text-align: center; border-bottom: 3px solid #10b981; padding-bottom: 12px; margin-bottom: 20px; }
        .header h1 { font-size: 20px; margin: 0; color: #10b981; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #f8fafc; padding: 8px 6px; text-align: left; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 8px 6px; border-bottom: 1px solid #f1f5f9; }
        .right { text-align: right; }
        .total-row { font-weight: 700; border-top: 2px solid #333; }
        .footer { text-align: center; font-size: 10px; color: #94a3b8; margin-top: 24px; border-top: 1px solid #e2e8f0; padding-top: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ business_name }}</h1>
        <p style="font-size: 13px; color: #64748b;">Sales Report — {{ month }}</p>
    </div>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Transactions</th>
                <th class="right">Total Sales</th>
            </tr>
        </thead>
        <tbody>
            {% for d in daily_sales %}
            <tr>
                <td>{{ d.sale_date }}</td>
                <td>{{ d.count }}</td>
                <td class="right">₱{{ "{:,.2f}".format(d.total) }}</td>
            </tr>
            {% endfor %}
            <tr class="total-row">
                <td colspan="2">Total</td>
                <td class="right">₱{{ "{:,.2f}".format(total_sales) }}</td>
            </tr>
        </tbody>
    </table>
    <div class="footer">Generated by TARA Accounting System</div>
</body>
</html>
