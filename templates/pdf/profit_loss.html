<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profit & Loss - {{ month }}</title>
    <style>
        @page { margin: 20px; size: A4; }
        body { font-family: Arial, sans-serif; color: #1e293b; }
        .header { text-align: center; border-bottom: 3px solid #10b981; padding-bottom: 12px; margin-bottom: 24px; }
        .header h1 { font-size: 22px; margin: 0; color: #10b981; }
        .header p { font-size: 13px; color: #64748b; margin: 4px 0 0; }
        .summary { display: flex; gap: 16px; margin-bottom: 24px; }
        .summary-card { flex: 1; background: #f8fafc; border-radius: 10px; padding: 16px; text-align: center; border: 1px solid #e2e8f0; }
        .summary-card .label { font-size: 11px; color: #64748b; text-transform: uppercase; }
        .summary-card .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
        .footer { text-align: center; font-size: 10px; color: #94a3b8; margin-top: 32px; border-top: 1px solid #e2e8f0; padding-top: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ business_name }}</h1>
        <p>Profit & Loss Statement — {{ month }}</p>
    </div>
    
    <div class="summary">
        <div class="summary-card">
            <div class="label">Revenue</div>
            <div class="value" style="color: #10b981;">₱ {{ "{:,.2f}".format(revenue) }}</div>
        </div>
        <div class="summary-card">
            <div class="label">Expenses</div>
            <div class="value" style="color: #ef4444;">₱ {{ "{:,.2f}".format(expenses) }}</div>
        </div>
        <div class="summary-card">
            <div class="label">Net Profit</div>
            <div class="value" style="color: {% if profit >= 0 %}#10b981{% else %}#ef4444{% endif %};">
                ₱ {{ "{:,.2f}".format(profit) }}
            </div>
        </div>
    </div>
    
    <div class="footer">
        Generated by TARA Accounting System on {{ today.strftime('%B %d, %Y') }}
    </div>
</body>
</html>
